version: "3.8"

services:
  app:
    build: .
    container_name: codconnect-app
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - server/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./dist:/app/dist
      - uploads:/app/server/uploads

  db:
    image: postgres:16-alpine
    container_name: codconnect-db
    restart: always
    environment:
      POSTGRES_USER: codconnect_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-strongpassword}
      POSTGRES_DB: codconnect_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codconnect_user -d codconnect_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
  uploads:
