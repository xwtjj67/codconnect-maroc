version: "3.8"

services:
  app:
    build: .
    container_name: codconnect-app
    restart: always
    ports:
      - "3001:3001"
    env_file:
      - server/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/server/uploads

  nginx:
    image: nginx:alpine
    container_name: codconnect-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./server/nginx/codconnect.conf:/etc/nginx/conf.d/default.conf
      - uploads:/var/www/uploads:ro
    depends_on:
      - app

  db:
    image: postgres:16-alpine
    container_name: codconnect-db
    restart: always
    environment:
      POSTGRES_USER: codconnect_user
      POSTGRES_PASSWORD: ${DB_PASSWORD:-yZE8vCmsuka}
      POSTGRES_DB: codconnect_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/config/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codconnect_user -d codconnect_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: codconnect-pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@codconnect.ma
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_LISTEN_PORT: 5050
    ports:
      - "5050:5050"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./server/config/pgadmin-servers.json:/pgadmin4/servers.json
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
  uploads:
  pgadmin_data:
